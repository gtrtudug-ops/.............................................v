name: ubuntu CPU (4)
on: workflow_dispatch

jobs:
  multi:
    # 4 vCPU / 16 GB RAM (Public Repo)
    runs-on: ubuntu-latest
    steps:
      - name: 1. Verify Hardware Specs
        run: |
          echo "CPU Cores: $(nproc)"
          echo "Total RAM: $(free -h | grep Mem | awk '{print $2}')"

      - name: 2. Start tmate SSH
        uses: mxschmitt/action-tmate@v3
        # Removed the 'limit-access' line to fix your SSH key error.
        # Just click the Web Shell link in your logs to enter!

      - name: 3. Keep Runner Alive (6 Hours)
        run: sleep 21600
